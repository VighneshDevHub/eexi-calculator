{% extends "layout.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h1><i class="fas fa-ship"></i> EEXI Compliance</h1>
        <p class="subtitle">Enter vessel design parameters for IMO MEPC.350(78) assessment.</p>
    </div>
    
    {% if error %}
    <div class="error-msg">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form action="{{ url_for('calculate') }}" method="POST" id="eexiForm">
        <input type="hidden" id="user_local_time" name="user_local_time">
        
        <div class="form-section">
            <h3 class="section-title"><i class="fas fa-info-circle"></i> Basic Information</h3>
            <div class="grid grid-2">
                <div class="field-group">
                    <label for="vessel_name">Vessel Name</label>
                    <input type="text" id="vessel_name" name="vessel_name" placeholder="e.g. MV Ocean Star" value="{{ form_data.vessel_name if form_data else '' }}">
                </div>
                
                <div class="field-group">
                    <label for="ship_type">Ship Type</label>
                    <select id="ship_type" name="ship_type" required>
                        <option value="" disabled {{ 'selected' if not form_data else '' }}>Select Ship Type</option>
                        {% for key, label in SHIP_LABELS.items() %}
                        <option value="{{ key }}" {{ 'selected' if form_data and form_data.ship_type == key else '' }}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="grid grid-2">
                <div class="field-group" id="dwt-group">
                    <label for="dwt">Deadweight (DWT) <span class="unit">[tonnes]</span></label>
                    <input type="number" step="0.01" id="dwt" name="dwt" placeholder="e.g. 75000" value="{{ form_data.dwt if form_data else '' }}">
                </div>

                <div class="field-group" id="gt-group">
                    <label for="gt">Gross Tonnage (GT)</label>
                    <input type="number" step="0.01" id="gt" name="gt" placeholder="e.g. 50000" value="{{ form_data.gt if form_data else '' }}">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3 class="section-title"><i class="fas fa-microchip"></i> Main Engine (ME)</h3>
            <div class="grid grid-2">
                <div class="field-group">
                    <label for="mcr">Main Engine MCR <span class="unit">[kW]</span></label>
                    <input type="number" step="0.01" id="mcr" name="mcr" required placeholder="e.g. 12000" value="{{ form_data.mcr if form_data else '' }}">
                </div>

                <div class="field-group">
                    <label for="sfc">ME SFC at 75% MCR <span class="unit">[g/kWh]</span></label>
                    <input type="number" step="0.01" id="sfc" name="sfc" required placeholder="e.g. 175" value="{{ form_data.sfc if form_data else '' }}">
                </div>
            </div>

            <div class="grid grid-2">
                <div class="field-group">
                    <label for="fuel_type">ME Fuel Type</label>
                    <select id="fuel_type" name="fuel_type" required>
                        {% for key, label in CF_LABELS.items() %}
                        <option value="{{ key }}" {{ 'selected' if form_data and form_data.fuel_type == key else '' }}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field-group">
                    <label for="speed">Design Speed (V_ref) <span class="unit">[knots]</span></label>
                    <input type="number" step="0.01" id="speed" name="speed" required placeholder="e.g. 14.5" value="{{ form_data.speed if form_data else '' }}">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3 class="section-title"><i class="fas fa-bolt"></i> Auxiliary Engine (AE)</h3>
            <div class="grid grid-3">
                <div class="field-group">
                    <label for="pae">AE Power <span class="unit">[kW]</span></label>
                    <input type="number" step="0.01" id="pae" name="pae" placeholder="e.g. 500" value="{{ form_data.pae if form_data else '' }}">
                </div>
                <div class="field-group">
                    <label for="sfc_ae">AE SFC <span class="unit">[g/kWh]</span></label>
                    <input type="number" step="0.01" id="sfc_ae" name="sfc_ae" placeholder="e.g. 190" value="{{ form_data.sfc_ae if form_data else '' }}">
                </div>
                <div class="field-group">
                    <label for="fuel_type_ae">AE Fuel Type</label>
                    <select id="fuel_type_ae" name="fuel_type_ae">
                        <option value="">Same as ME</option>
                        {% for key, label in CF_LABELS.items() %}
                        <option value="{{ key }}" {{ 'selected' if form_data and form_data.fuel_type_ae == key else '' }}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-calculator"></i> Run Compliance Assessment
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('user_local_time').value = new Date().toLocaleString();
    const shipType = document.getElementById('ship_type');
    const dwtGroup = document.getElementById('dwt-group');
    const gtGroup = document.getElementById('gt-group');
    function updateCapacityFields() {
        const type = shipType.value;
        if (type === 'ro_ro_pass' || type === 'cruise') {
            dwtGroup.style.display = 'none';
            gtGroup.style.display = 'block';
        } else {
            dwtGroup.style.display = 'block';
            gtGroup.style.display = 'none';
        }
    }
    shipType.addEventListener('change', updateCapacityFields);
    updateCapacityFields();
</script>
{% endblock %}
