<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EEXI Calculator - Maritime Compliance</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a href="{{ url_for('index') }}" class="logo">
          <i class="fas fa-ship"></i> EEXI<span>Calculator</span>
        </a>
        <ul class="nav-links">
          <li>
            <a href="{{ url_for('index') }}"
              ><i class="fas fa-calculator"></i> Calculate</a
            >
          </li>
          <li>
            <a href="{{ url_for('history') }}"
              ><i class="fas fa-history"></i> History</a
            >
          </li>
          <li>
            <a href="{{ url_for('manual') }}"
              ><i class="fas fa-book"></i> User Manual</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <main class="container">{% block content %}{% endblock %}</main>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2024 Goltens EEXI Compliance Tool. All rights reserved.</p>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
