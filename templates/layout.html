<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EEXI Calculator - Maritime Compliance</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a href="{{ url_for('index') }}" class="logo">
          <i class="fas fa-compass"></i> Goltens<span>EEXI</span>
        </a>
        <div class="nav-right">
          <button class="menu-toggle" aria-label="Toggle menu">
            <i class="fas fa-bars"></i>
          </button>
          <ul class="nav-links">
            <li>
              <a href="{{ url_for('index') }}"
                ><i class="fas fa-calculator"></i> EEXI</a
              >
            </li>
            <li>
              <a href="{{ url_for('cii_page') }}"
                ><i class="fas fa-chart-line"></i> CII</a
              >
            </li>
            <li>
              <a href="{{ url_for('history') }}"
                ><i class="fas fa-history"></i> History</a
              >
            </li>
            <li>
              <a href="{{ url_for('manual') }}"
                ><i class="fas fa-book"></i> User Manual</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container">{% block content %}{% endblock %}</main>

    <footer class="footer">
      <div class="container">
        <p>
          &copy; {{ now.year if now else '2026' }} Goltens EEXI Compliance Tool.
          All Rights Reserved.
        </p>
        <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7">
          Developed for IMO MEPC.350(78) Regulatory Standards.
        </p>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
